<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RIRI Studios</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Helvetica, Arial, sans-serif;
      background: black;
      color: white;
      text-align: center;
    }

    .container {
      padding: 60px 20px;
    }

    h1 {
      letter-spacing: 2px;
      font-weight: 400;
    }

    .tagline {
      margin-top: 10px;
      font-size: 14px;
      opacity: 0.7;
    }

    .headline {
      margin-top: 80px;
      font-size: 28px;
      letter-spacing: 2px;
    }

    .sub {
      margin-top: 10px;
      font-size: 14px;
      opacity: 0.7;
    }

    .countdown {
      margin: 40px 0;
      font-size: 18px;
      letter-spacing: 3px;
    }

    form.subscribe-form {
      margin-top: 30px;
    }

    input[type="email"] {
      padding: 14px;
      width: 260px;
      border: none;
      margin-right: 10px;
      font-size: 14px;
    }

    button {
      padding: 14px 24px;
      background: white;
      color: black;
      border: none;
      cursor: pointer;
      letter-spacing: 1px;
    }

    .footer {
      margin-top: 80px;
      font-size: 12px;
      opacity: 0.5;
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>RIRI STUDIOS</h1>
    <div class="tagline">surreal vision, designed reality.</div>

    <div class="headline">THE STUDIO IS OPENING</div>
    <div class="sub">Something is coming.</div>

    <div class="countdown">
      00 DAYS · 00 HOURS · 00 MINUTES · 00 SECONDS
    </div>

    <h3>BE FIRST TO KNOW</h3>

    <!-- ✅ MAILCHIMP FORM (WORKING) -->
    <form 
      action="https://riristudios.us19.list-manage.com/subscribe/post?u=8c95281fe0b94beac1fcf3803&id=481b2160c5&f_id=001a85e0f0"
      method="POST"
      target="_blank"
      class="subscribe-form"
    >
      <input 
        type="email" 
        name="EMAIL" 
        placeholder="Enter your email"
        required
      >
      <button type="submit">NOTIFY ME</button>
    </form>

    <div class="sub">NO SPAM. JUST THE DROP.</div>

    <div class="footer">
      © 2026 RIRI STUDIOS · ARIANNA@RIRISTUDIOS.COM · TORONTO
    </div>

  </div>

</body>
</html>
